services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: marketing
    ports:
      # только localhost: БД не должна торчать в интернет (dev-compose)
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d marketing"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://app:app@db:5432/marketing?sslmode=disable
    ports:
      # только localhost: наружу marketing идёт только через Caddy (/marketing)
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
